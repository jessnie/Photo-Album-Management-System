<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Photo Album Manager</title>
    <style>
        :root { --primary: #ff6b6b; --bg: #f8f9fa; --card-bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; }
        
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { color: var(--primary); margin: 0; }
        .header-links a { color: var(--primary); text-decoration: none; margin-left: 1rem; }
        .header-links a:hover { text-decoration: underline; }
        
        .profile-card { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .profile-card h2 { color: var(--primary); margin-top: 0; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #fa5252; }
        
        .messages { margin-bottom: 1rem; }
        .message { padding: 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; }
        .message.error { background: #ffe0e0; color: #c92a2a; border-left: 4px solid #c92a2a; }
        .message.success { background: #d3f9d8; color: #2b8a3e; border-left: 4px solid #2b8a3e; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .stat-card { background: #f8f9fa; padding: 1rem; border-radius: 8px; text-align: center; }
        .stat-card .stat-label { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .stat-card .stat-value { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Profile</h1>
            <div class="header-links">
                <a href="{% url 'gallery_home' %}">Gallery</a>
                <a href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <div class="profile-card">
            <h2>Account Information</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" value="{{ user.username }}" disabled>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ user.email }}">
                </div>
                
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}">
                </div>
                
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}">
                </div>
                
                <button type="submit" class="btn-submit">Update Profile</button>
            </form>
        </div>
        
        <div class="profile-card">
            <h2>Account Statistics</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Photos Uploaded</div>
                    <div class="stat-value">{{ photo_count }}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Account Status</div>
                    <div class="stat-value">
                        {% if user.is_staff %}
                            Admin
                        {% else %}
                            Active
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
