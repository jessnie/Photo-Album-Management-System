<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Photo Album Manager</title>
    <style>
        :root { --primary: #ff6b6b; --bg: #f8f9fa; --card-bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; }
        
        .container { max-width: 400px; margin: 4rem auto; }
        .auth-card { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .auth-card h1 { color: var(--primary); text-align: center; margin-top: 0; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn-submit:hover { background: #fa5252; }
        
        .messages { margin-bottom: 1rem; }
        .message { padding: 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; }
        .message.error { background: #ffe0e0; color: #c92a2a; border-left: 4px solid #c92a2a; }
        .message.success { background: #d3f9d8; color: #2b8a3e; border-left: 4px solid #2b8a3e; }
        
        .auth-links { text-align: center; margin-top: 1.5rem; }
        .auth-links a { color: var(--primary); text-decoration: none; margin: 0 0.5rem; }
        .auth-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <h1>Login</h1>
            
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
            </form>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
