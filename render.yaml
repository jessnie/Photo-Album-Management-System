# Render Infrastructure Configuration
# This file defines the services needed for the application

services:
  # Web Service
  - type: web
    name: photo-album-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn recipe_project.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        fromService:
          name: photo-album-web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: photo-album-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        value: https://${RENDER_EXTERNAL_HOSTNAME}

  # PostgreSQL Database Service
  - type: pgsql
    name: photo-album-db
    plan: free
    ipAllowList: []
